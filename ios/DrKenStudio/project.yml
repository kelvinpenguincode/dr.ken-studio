name: DrKenStudio
options:
  bundleIdPrefix: com.drkenstudio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Dr. Ken Studio
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_NSHumanReadableCopyright: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.drkenstudio.drkenstudio
targets:
  DrKenStudio:
    type: application
    platform: iOS
    sources:
      - path: DrKenStudio
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.drkenstudio.drkenstudio
        INFOPLIST_FILE: DrKenStudio/Info.plist
    info:
      path: DrKenStudio/Info.plist
      properties:
        CFBundleDisplayName: Dr. Ken Studio
        UILaunchScreen: {}
