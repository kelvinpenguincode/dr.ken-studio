name: DrKenStudio
options:
  bundleIdPrefix: com.drkenstudio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Use the explicit Info.plist only — do not also auto-generate one
    # (avoids "Multiple commands produce Info.plist")
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_BUNDLE_IDENTIFIER: com.drkenstudio.orders
targets:
  DrKenStudio:
    type: application
    platform: iOS
    sources:
      - path: DrKenStudio
        excludes:
          - "**/*.md"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.drkenstudio.orders
        INFOPLIST_FILE: DrKenStudio/Info.plist
        INFOPLIST_EXPAND_BUILD_SETTINGS: YES
        INFOPLIST_KEY_CFBundleDisplayName: Dr. Ken Studio
      configs:
        Debug:
          DK_PUSH_APS_ENV: development
          CODE_SIGN_ENTITLEMENTS: DrKenStudio/DrKenStudioDebug.entitlements
        Release:
          DK_PUSH_APS_ENV: production
          CODE_SIGN_ENTITLEMENTS: DrKenStudio/DrKenStudio.entitlements
    info:
      path: DrKenStudio/Info.plist
      properties:
        CFBundleDisplayName: Dr. Ken Studio
        UILaunchScreen: {}
        UIBackgroundModes:
          - remote-notification
